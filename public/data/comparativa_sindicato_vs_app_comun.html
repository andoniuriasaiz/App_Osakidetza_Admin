<script>
const DATA = [{"cat":"Ley 44/2003 \u2014 Ordenaci\u00f3n de las Profesiones Sanitarias","num":1,"enunciado":"De acuerdo con las normas generales de ordenaci\u00f3n de las profesiones sanitarias, para poder ejercer una profesi\u00f3n sanitaria ser\u00e1 requisito imprescindible:","app":"A","sindicato":"D","correcta":"D","quien":"SINDICATO","explicacion":"Art. 2 Ley 44/2003: Para ejercer una profesi\u00f3n sanitaria son requisitos: la colegiaci\u00f3n (cuando ley estatal la exija), la inexistencia de inhabilitaci\u00f3n o suspensi\u00f3n, Y tener suscrito seguro de responsabilidad cuando se ejerza en asistencia sanitaria p\u00fablica. Al tratarse de requisitos acumulativos, 'todo lo anterior' es la respuesta correcta. Respuesta D."},{"cat":"Ley 44/2003 \u2014 Ordenaci\u00f3n de las Profesiones Sanitarias","num":2,"enunciado":"Seg\u00fan lo establecido en la normativa vigente sobre ordenaci\u00f3n de las profesiones sanitarias, para poder ejercer una profesi\u00f3n sanitaria:","app":"C","sindicato":"B","correcta":"C","quien":"APP","explicacion":"Art. 2 Ley 44/2003: El seguro de responsabilidad se exige 'cuando se ejerza la profesi\u00f3n en el \u00e1mbito de la asistencia sanitaria P\u00daBLICA', no privada. La opci\u00f3n C es la \u00fanica que recoge correctamente el \u00e1mbito p\u00fablico y acepta tanto seguro individual como aval u otra garant\u00eda financiera de protecci\u00f3n colectiva. Respuesta C."},{"cat":"Ley 44/2003 \u2014 Ordenaci\u00f3n de las Profesiones Sanitarias","num":4,"enunciado":"Seg\u00fan la normativa vigente, el \u00f3rgano encargado del Registro Estatal de Profesionales Sanitarios podr\u00e1:","app":"A","sindicato":"C","correcta":"A","quien":"APP","explicacion":"Art. 3 bis Ley 44/2003 (a\u00f1adido por Ley 6/2023): El \u00f3rgano del Registro Estatal de Profesionales Sanitarios podr\u00e1 consultar los datos del DNI/NIE del personal sanitario ante el organismo competente en identificaci\u00f3n de personas para verificar la autenticidad de los documentos aportados. Respuesta A."},{"cat":"Ley 44/2003 \u2014 Ordenaci\u00f3n de las Profesiones Sanitarias","num":5,"enunciado":"En el marco de la ordenaci\u00f3n de las profesiones sanitarias, las personas pacientes:","app":"D","sindicato":"A","correcta":"D","quien":"APP","explicacion":"Art. 5.3 Ley 44/2003: Los pacientes tienen derecho a conocer el nombre, la titulaci\u00f3n y la especialidad de los profesionales sanitarios que les atienden, as\u00ed como a recibir informaci\u00f3n completa y continuada. La opci\u00f3n D recoge correctamente el conjunto de derechos reconocidos. Respuesta D."},{"cat":"Ley 44/2003 \u2014 Ordenaci\u00f3n de las Profesiones Sanitarias","num":7,"enunciado":"De acuerdo con las normas generales de ordenaci\u00f3n de las profesiones sanitarias, el ejercicio del derecho a la libertad de prescripci\u00f3n, dentro del \u00e1mbito de las competencias profesionales:","app":"A","sindicato":"C","correcta":"A","quien":"APP","explicacion":"Art. 5.2 Ley 44/2003: La libertad de prescripci\u00f3n se ejerce dentro del \u00e1mbito de la legalidad vigente, incluyendo los acuerdos de las organizaciones en cuyo seno se trabaje. No conlleva el rechazo a protocolos sin justificaci\u00f3n. La A recoge el matiz correcto: puede ejercerse con criterio personal pero dentro del marco legal y organizativo. Respuesta A."},{"cat":"Ley 44/2003 \u2014 Ordenaci\u00f3n de las Profesiones Sanitarias","num":9,"enunciado":"De acuerdo con la Ley 44/2003, de 21 de noviembre, de ordenaci\u00f3n de las profesiones sanitarias, corresponde a las Administraciones sanitarias:","app":"D","sindicato":"B","correcta":"D","quien":"APP","explicacion":"Art. 6 Ley 44/2003: A las Administraciones sanitarias corresponde, entre otras funciones: homologar los programas formativos, acreditar a las entidades para impartir formaci\u00f3n especializada, y llevar el Registro de Especialistas. La opci\u00f3n D agrupa correctamente estas atribuciones. Respuesta D."},{"cat":"Ley 44/2003 \u2014 Ordenaci\u00f3n de las Profesiones Sanitarias","num":11,"enunciado":"Seg\u00fan dispone la Ley 44/2003, de 21 de noviembre, de ordenaci\u00f3n de las profesiones sanitarias, cuando los profesionales sanitarios tengan el grado de Doctor:","app":"A","sindicato":"B","correcta":"A","quien":"APP","explicacion":"Art. 6.3 Ley 44/2003: Los profesionales con grado de Doctor en ciencias de la salud que presten servicios en el \u00e1mbito sanitario p\u00fablico tienen reconocido el derecho a desarrollar tareas de investigaci\u00f3n en su jornada laboral ordinaria seg\u00fan acuerden con la instituci\u00f3n. La A recoge esta prerrogativa. Respuesta A."},{"cat":"Ley 44/2003 \u2014 Ordenaci\u00f3n de las Profesiones Sanitarias","num":13,"enunciado":"De acuerdo con la Ley 44/2003, de 21 de noviembre, de ordenaci\u00f3n de las profesiones sanitarias, el ejercicio de las profesiones sanitarias tituladas:","app":"D","sindicato":"C","correcta":"D","quien":"APP","explicacion":"Art. 7.1 Ley 44/2003: El ejercicio de las profesiones sanitarias tituladas est\u00e1 sometido a los principios de eficacia, sujeci\u00f3n al ordenamiento jur\u00eddico, deontolog\u00eda profesional y al respeto de los derechos de los pacientes. La opci\u00f3n D recoge el conjunto correcto. Respuesta D."},{"cat":"Ley 44/2003 \u2014 Ordenaci\u00f3n de las Profesiones Sanitarias","num":17,"enunciado":"De acuerdo con la Ley 44/2003, de 21 de noviembre, de ordenaci\u00f3n de las profesiones sanitarias, diga cu\u00e1l de las siguientes respuestas es INCORRECTA:","app":"D","sindicato":"C","correcta":"D","quien":"APP","explicacion":"Art. 10.3 Ley 44/2003: Los equipos de atenci\u00f3n primaria son grupos de profesionales sanitarios y no sanitarios (no solo sanitarios) con organizaci\u00f3n jerarquizada. La afirmaci\u00f3n de que el m\u00e9dico de familia siempre ostenta la coordinaci\u00f3n del equipo es INCORRECTA (puede recaer en otro profesional seg\u00fan la organizaci\u00f3n). La D es la opci\u00f3n incorrecta. Respuesta D."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":73,"enunciado":"Seg\u00fan establece la Ley 8/1997, de 26 de junio, de Ordenaci\u00f3n Sanitaria de Euskadi:","app":"C","sindicato":"D","correcta":"C","quien":"APP","explicacion":"Art. 8 Ley 8/1997: El Consejo Vasco de Salud es el \u00f3rgano consultivo y de participaci\u00f3n en materia sanitaria del Gobierno Vasco, presidido por el Consejero competente en sanidad, e integrado por representantes de las Administraciones implicadas, de los agentes sociales y de las organizaciones de consumidores y usuarios. La C recoge esta configuraci\u00f3n. Respuesta C."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":81,"enunciado":"El ente p\u00fablico Osakidetza-Servicio Vasco de Salud es:","app":"B","sindicato":"A","correcta":"B","quien":"APP","explicacion":"Art. 31 Ley 8/1997 y Decreto 255/1997: Osakidetza es un ente p\u00fablico de derecho privado, con personalidad jur\u00eddica propia y plena capacidad para el cumplimiento de sus fines, sometido al derecho privado en sus relaciones externas excepto en el ejercicio de potestades p\u00fablicas. No es organismo aut\u00f3nomo ni agencia, sino ente p\u00fablico. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":95,"enunciado":"El n\u00famero de integrantes del equipo directivo de las organizaciones de servicios sanitarios del ente p\u00fablico Osakidetza es:","app":"A","sindicato":"C","correcta":"A","quien":"APP","explicacion":"Decreto 100/2018, art. 9: El equipo directivo de cada organizaci\u00f3n de servicios de Osakidetza est\u00e1 compuesto por cuatro miembros: el Director/a, el Director/a M\u00e9dico/a, el Director/a de Enfermer\u00eda y el Director/a de Gesti\u00f3n. Respuesta A (4 miembros)."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":102,"enunciado":"Seg\u00fan el Art\u00edculo 1 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente p\u00fablico Osakidetza-Servicio Vasco de Salud, son organizaciones sanitarias integradas:","app":"C","sindicato":"D","correcta":"C","quien":"APP","explicacion":"Art. 1 Decreto 100/2018: Las organizaciones sanitarias integradas (OSI) de Osakidetza son estructuras organizativas que integran la atenci\u00f3n primaria y la atenci\u00f3n especializada de un territorio, bajo una \u00fanica direcci\u00f3n y con un presupuesto \u00fanico. Respuesta C."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":106,"enunciado":"Seg\u00fan el Decreto 100/2018 de las organizaciones sanitarias integradas del ente p\u00fablico Osakidetza-Servicio Vasco de Salud, el \u00f3rgano de gobierno de cada organizaci\u00f3n de servicios:","app":"B","sindicato":"C","correcta":"B","quien":"APP","explicacion":"Decreto 100/2018, art. 7: El \u00f3rgano de gobierno de cada organizaci\u00f3n de servicios es el Consejo de Direcci\u00f3n, presidido por el Director/a de la organizaci\u00f3n e integrado por el equipo directivo y representantes del personal. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":108,"enunciado":"Seg\u00fan el Art\u00edculo 5 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente p\u00fablico Osakidetza-Servicio Vasco de Salud:","app":"B","sindicato":"D","correcta":"B","quien":"APP","explicacion":"Art. 5 Decreto 100/2018: Las OSI se crean mediante Decreto del Consejo de Gobierno a propuesta del Consejero de Salud, previo informe del Consejo de Administraci\u00f3n de Osakidetza. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":110,"enunciado":"De acuerdo con el Decreto 100/2018 de las organizaciones sanitarias integradas del ente p\u00fablico Osakidetza:","app":"B","sindicato":"C","correcta":"B","quien":"APP","explicacion":"Decreto 100/2018, art. 9.2: El Director/a M\u00e9dico/a y el Director/a de Enfermer\u00eda son nombrados por el Director General de Osakidetza a propuesta del Director/a de la organizaci\u00f3n. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":121,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"A","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: La Declaraci\u00f3n reconoce el derecho a recibir informaci\u00f3n cl\u00ednica veraz, comprensible y adecuada a las necesidades de la persona, respetando su autonom\u00eda. La opci\u00f3n B recoge correctamente el alcance del derecho a la informaci\u00f3n reconocido en este Decreto. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":122,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"A","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: El sistema sanitario vasco garantiza el derecho a recibir asistencia sanitaria en condiciones de igualdad efectiva, sin discriminaci\u00f3n por ning\u00fan motivo. La B refleja correctamente este principio de no discriminaci\u00f3n y acceso igualitario. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":123,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"A","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: La Declaraci\u00f3n establece que las personas tienen derecho a recibir la informaci\u00f3n necesaria para tomar decisiones sobre su salud de forma aut\u00f3noma. La opci\u00f3n B es correcta al recoger el alcance de la autonom\u00eda del paciente conforme a este Decreto. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":124,"enunciado":"El Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, establece que el documento de voluntades anticipadas:","app":"A","sindicato":"D","correcta":"A","quien":"APP","explicacion":"Decreto 147/2015 y Ley 7/2002: El documento de voluntades anticipadas puede otorgarse ante notario, ante tres testigos o ante el responsable del Registro de Voluntades Anticipadas del Pa\u00eds Vasco, sin necesidad de presencia m\u00e9dica. La A recoge correctamente las formas de otorgamiento. Respuesta A."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":129,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"C","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: Las personas tienen el deber de utilizar de forma responsable los recursos sanitarios, seguir las instrucciones de los profesionales que les atienden y colaborar con el sistema para su sostenibilidad. La B recoge correctamente este deber de uso responsable. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":131,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"D","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: El deber de colaboraci\u00f3n incluye proporcionar informaci\u00f3n veraz sobre el estado de salud, cumplir las recomendaciones, y no utilizar el sistema de forma abusiva. La B es la opci\u00f3n que recoge correctamente este conjunto de deberes. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":133,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"A","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: Las personas tienen derecho a que se respete su intimidad y confidencialidad en el acceso a sus datos de salud. La B recoge correctamente el alcance del derecho a la intimidad y a la protecci\u00f3n de datos en el \u00e1mbito sanitario vasco. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":134,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"D","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: El sistema sanitario de Euskadi garantiza el derecho de las personas a ser atendidas con respeto a su dignidad, sin recibir tratos degradantes. La B es la respuesta que recoge correctamente este derecho fundamental en el \u00e1mbito sanitario. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":135,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"A","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: El derecho a la segunda opini\u00f3n m\u00e9dica est\u00e1 reconocido para determinadas patolog\u00edas y condiciones recogidas en el Decreto 149/2007. La B es correcta al delimitar correctamente el \u00e1mbito de aplicaci\u00f3n de este derecho. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":136,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"D","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: Las personas tienen derecho a recibir asistencia urgente en cualquier centro sanitario, con independencia de la entidad financiadora. La B recoge correctamente este derecho de acceso a urgencias. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":137,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"A","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: Los menores de edad tienen derecho a recibir informaci\u00f3n y a participar en las decisiones sobre su salud seg\u00fan su madurez, respetando la intervenci\u00f3n de los representantes legales. La B es la opci\u00f3n que recoge correctamente el r\u00e9gimen de derechos de los menores. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":138,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"C","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: El derecho al consentimiento informado incluye el derecho a revocar el consentimiento en cualquier momento, debiendo anotarse en la historia cl\u00ednica. La B recoge correctamente el r\u00e9gimen de revocaci\u00f3n del consentimiento informado. Respuesta B."},{"cat":"Ley 8/1997 \u2014 Ordenaci\u00f3n Sanitaria de Euskadi","num":139,"enunciado":"Seg\u00fan el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaraci\u00f3n sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi:","app":"B","sindicato":"A","correcta":"B","quien":"APP","explicacion":"Decreto 147/2015: Se reconoce el derecho a presentar quejas, reclamaciones y sugerencias, y a recibir respuesta por escrito en un plazo razonable. La B es correcta al recoger el procedimiento de reclamaciones en el sistema sanitario vasco. Respuesta B."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":21,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, sus disposiciones tienen car\u00e1cter de bases estatales y tienen por objeto:","app":"D","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Art. 1 Ley 16/2003: El objeto de la ley es establecer el marco legal para las acciones de coordinaci\u00f3n y cooperaci\u00f3n de las Administraciones p\u00fablicas sanitarias en el ejercicio de sus respectivas competencias, de modo que se garantice la equidad, la calidad y la participaci\u00f3n social en el SNS. La opci\u00f3n B recoge este objeto correctamente. Respuesta B."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":23,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, la cartera de servicios comunes del SNS:","app":"D","sindicato":"C","correcta":"C","quien":"SINDICATO","explicacion":"Art. 7 Ley 16/2003: La cartera de servicios comunes del SNS se establece mediante Real Decreto del Consejo de Ministros, a propuesta del Ministro de Sanidad, previo acuerdo del Consejo Interterritorial. Se actualiza peri\u00f3dicamente. La C recoge correctamente el procedimiento de aprobaci\u00f3n y actualizaci\u00f3n. Respuesta C."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":24,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, la atenci\u00f3n primaria:","app":"D","sindicato":"A","correcta":"A","quien":"SINDICATO","explicacion":"Art. 12 Ley 16/2003: La atenci\u00f3n primaria es el nivel b\u00e1sico e inicial de atenci\u00f3n, garantiza la globalidad y continuidad de la atenci\u00f3n a lo largo de toda la vida del paciente, actuando como gestor y coordinador de casos y regulador de flujos. La A recoge estas caracter\u00edsticas. Respuesta A."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":25,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, la atenci\u00f3n de urgencia:","app":"D","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Art. 15 Ley 16/2003: La atenci\u00f3n de urgencia se presta al paciente en los casos en que su situaci\u00f3n cl\u00ednica obliga a una atenci\u00f3n sanitaria inmediata, garantiz\u00e1ndose en todos los centros sanitarios p\u00fablicos, privados y en los espacios p\u00fablicos. La B recoge correctamente la definici\u00f3n y alcance. Respuesta B."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":28,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, la alta inspecci\u00f3n en materia sanitaria:","app":"D","sindicato":"A","correcta":"A","quien":"SINDICATO","explicacion":"Art. 43 Ley 16/2003: La alta inspecci\u00f3n es una funci\u00f3n indelegable del Estado que corresponde a la Administraci\u00f3n General del Estado, ejercida a trav\u00e9s del Ministerio de Sanidad, y que garantiza el cumplimiento de los derechos de los ciudadanos. Respuesta A."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":29,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, la financiaci\u00f3n del SNS:","app":"D","sindicato":"C","correcta":"C","quien":"SINDICATO","explicacion":"Art. 46 Ley 16/2003: La financiaci\u00f3n del SNS tiene car\u00e1cter p\u00fablico. Los recursos econ\u00f3micos del Sistema Nacional de Salud estar\u00e1n constituidos por las aportaciones del Estado y de las Comunidades Aut\u00f3nomas, as\u00ed como por cualesquiera otros ingresos. La C recoge esta configuraci\u00f3n. Respuesta C."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":30,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, la Red de Centros, Servicios y Establecimientos del SNS:","app":"D","sindicato":"A","correcta":"A","quien":"SINDICATO","explicacion":"Art. 47 Ley 16/2003: La Red de Centros, Servicios y Establecimientos del SNS est\u00e1 integrada por todos los centros de titularidad p\u00fablica o privada vinculados al Sistema Nacional de Salud mediante acuerdos o convenios. Respuesta A."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":32,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, para poder acceder a los servicios del SNS hay que acreditar residencia en el territorio espa\u00f1ol:","app":"D","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Art. 3 Ley 16/2003 (modificado por RDL 16/2012): Son titulares de los derechos de la protecci\u00f3n de la salud y de la atenci\u00f3n sanitaria las personas con nacionalidad espa\u00f1ola o extranjeras que tengan reconocido ese derecho. La B es correcta. Respuesta B."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":33,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, la atenci\u00f3n sociosanitaria:","app":"D","sindicato":"A","correcta":"A","quien":"SINDICATO","explicacion":"Art. 14 Ley 16/2003: La atenci\u00f3n sociosanitaria comprende el conjunto de cuidados destinados a aquellos enfermos, generalmente cr\u00f3nicos, que por sus especiales caracter\u00edsticas pueden beneficiarse de la actuaci\u00f3n simult\u00e1nea y sinerg\u00e9tica de los servicios sanitarios y sociales. Respuesta A."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":34,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, los organismos de coordinaci\u00f3n del SNS son:","app":"D","sindicato":"A","correcta":"A","quien":"SINDICATO","explicacion":"Art. 47 Ley 16/2003: Los \u00f3rganos de coordinaci\u00f3n del SNS son el Consejo Interterritorial del Sistema Nacional de Salud y la Comisi\u00f3n de Recursos Humanos del SNS. La A recoge correctamente estos dos \u00f3rganos. Respuesta A."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":35,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, la Agencia de Calidad del SNS:","app":"D","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Art. 59 Ley 16/2003: La Agencia de Calidad del SNS funciona bajo la dependencia del Ministerio de Sanidad y tiene entre sus funciones apoyar a las CCAA en el desarrollo de los planes de calidad, verificar el estado de situaci\u00f3n, y promover el conocimiento y uso de las mejores pr\u00e1cticas. Respuesta B."},{"cat":"Ley 16/2003 \u2014 Cohesi\u00f3n y Calidad del Sistema Nacional de Salud","num":36,"enunciado":"Seg\u00fan dispone la Ley 16/2003, de 28 de mayo, de cohesi\u00f3n y calidad del Sistema Nacional de Salud, el Consejo Interterritorial del SNS:","app":"D","sindicato":"A","correcta":"A","quien":"SINDICATO","explicacion":"Art. 47 Ley 16/2003: El Consejo Interterritorial del SNS est\u00e1 compuesto por el Ministro de Sanidad (que lo preside), y por los Consejeros competentes en materia de sanidad de cada una de las CCAA. Sus acuerdos son de car\u00e1cter vinculante cuando as\u00ed lo establezca la normativa. Respuesta A."},{"cat":"Ley 55/2003 \u2014 Estatuto Marco del Personal Estatutario","num":42,"enunciado":"Seg\u00fan dispone la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, la jornada ordinaria de trabajo:","app":"A","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Art. 54 Ley 55/2003: La jornada ordinaria de trabajo del personal estatutario ser\u00e1 la que establezca cada Servicio de Salud, sin que pueda exceder de la jornada general del personal al servicio de la Administraci\u00f3n P\u00fablica de la respectiva Comunidad Aut\u00f3noma. Respuesta B."},{"cat":"Ley 55/2003 \u2014 Estatuto Marco del Personal Estatutario","num":47,"enunciado":"Conforme a la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, las convocatorias de concurso de traslados para plazas de personal estatutario fijo:","app":"D","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Art. 35 Ley 55/2003: Las convocatorias de concurso de traslados para personal estatutario fijo se efectuar\u00e1n al menos cada cuatro a\u00f1os y no podr\u00e1n incluir plazas que hayan sido obtenidas en otro concurso de traslados en los \u00faltimos dos a\u00f1os. Respuesta B."},{"cat":"Ley 55/2003 \u2014 Estatuto Marco del Personal Estatutario","num":50,"enunciado":"De acuerdo con la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, las comisiones de servicio:","app":"A","sindicato":"C","correcta":"C","quien":"SINDICATO","explicacion":"Art. 37 Ley 55/2003: Las comisiones de servicio pueden otorgarse, con car\u00e1cter voluntario o forzoso, por un plazo de hasta un a\u00f1o, prorrogable por otro m\u00e1s. El personal en comisi\u00f3n de servicio percibe las retribuciones correspondientes a su plaza de origen m\u00e1s las indemnizaciones que correspondan. Respuesta C."},{"cat":"Ley 55/2003 \u2014 Estatuto Marco del Personal Estatutario","num":52,"enunciado":"La Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, la promoci\u00f3n interna temporal:","app":"A","sindicato":"C","correcta":"C","quien":"SINDICATO","explicacion":"Art. 38 Ley 55/2003: La promoci\u00f3n interna temporal consiste en la ocupaci\u00f3n transitoria de plazas de categor\u00eda superior, manteni\u00e9ndose la relaci\u00f3n estatutaria de origen. Tiene car\u00e1cter excepcional y requiere cumplir los requisitos exigidos para el ingreso en la categor\u00eda superior. Respuesta C."},{"cat":"Ley 55/2003 \u2014 Estatuto Marco del Personal Estatutario","num":57,"enunciado":"Seg\u00fan establece la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, el personal estatutario fijo tendr\u00e1 derecho a disfrutar de una excedencia voluntaria por inter\u00e9s particular:","app":"C","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Art. 67 Ley 55/2003: La excedencia voluntaria por inter\u00e9s particular podr\u00e1 solicitarse por el personal que haya prestado servicios efectivos durante al menos los dos a\u00f1os anteriores. Conlleva la p\u00e9rdida del puesto de trabajo y s\u00f3lo se tendr\u00e1 derecho a reingresar cuando exista vacante. Respuesta B."},{"cat":"Ley 55/2003 \u2014 Estatuto Marco del Personal Estatutario","num":60,"enunciado":"La excedencia voluntaria solicitada por el personal estatutario de los servicios de salud por inter\u00e9s particular:","app":"A","sindicato":"C","correcta":"C","quien":"SINDICATO","explicacion":"Art. 67 Ley 55/2003: Durante la excedencia voluntaria por inter\u00e9s particular el personal no devenga retribuciones, ni le computa el tiempo a efectos de trienios, carrera ni jubilaci\u00f3n. Para reintegrarse necesita solicitar el reingreso y esperar a que haya vacante. Respuesta C."},{"cat":"Decreto 255/1997 \u2014 Estatutos Sociales Osakidetza","num":84,"enunciado":"La funci\u00f3n de nombrar y separar a quienes ocupen las Direcciones de Divisi\u00f3n de la organizaci\u00f3n central de Osakidetza le corresponde a:","app":"C","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Decreto 255/1997, art. 22: El nombramiento y separaci\u00f3n de los Directores de Divisi\u00f3n de la organizaci\u00f3n central de Osakidetza es competencia del Consejo de Administraci\u00f3n, a propuesta del Director General. La app indica C (Director General) pero la competencia recae en el Consejo de Administraci\u00f3n. Respuesta B."},{"cat":"Ley 41/2002 \u2014 Autonom\u00eda del Paciente y Documentaci\u00f3n Cl\u00ednica","num":141,"enunciado":"Seg\u00fan dispone la Ley 41/2002, de 14 de noviembre, b\u00e1sica reguladora de la autonom\u00eda del paciente y de derechos y obligaciones en materia de informaci\u00f3n y documentaci\u00f3n cl\u00ednica:","app":"C","sindicato":"D","correcta":"C","quien":"APP","explicacion":"Art. 3 Ley 41/2002: El concepto de 'documento cl\u00ednico' incluye todo soporte de cualquier clase o tipo que contiene datos, valoraciones e informaciones de car\u00e1cter asistencial. La C recoge correctamente esta definici\u00f3n amplia. Respuesta C."},{"cat":"Ley 41/2002 \u2014 Autonom\u00eda del Paciente y Documentaci\u00f3n Cl\u00ednica","num":143,"enunciado":"Seg\u00fan dispone la Ley 41/2002, de 14 de noviembre, b\u00e1sica reguladora de la autonom\u00eda del paciente y de derechos y obligaciones en materia de informaci\u00f3n y documentaci\u00f3n cl\u00ednica:","app":"C","sindicato":"A","correcta":"C","quien":"APP","explicacion":"Art. 5 Ley 41/2002: El titular del derecho a la informaci\u00f3n es el paciente. Los familiares ser\u00e1n informados en la medida que el paciente lo permita. La C recoge que la informaci\u00f3n se dar\u00e1 al paciente y s\u00f3lo subsidiariamente a quienes \u00e9l decida. Respuesta C."},{"cat":"Ley 41/2002 \u2014 Autonom\u00eda del Paciente y Documentaci\u00f3n Cl\u00ednica","num":145,"enunciado":"Seg\u00fan dispone la Ley 41/2002, de 14 de noviembre, b\u00e1sica reguladora de la autonom\u00eda del paciente y de derechos y obligaciones en materia de informaci\u00f3n y documentaci\u00f3n cl\u00ednica:","app":"C","sindicato":"B","correcta":"C","quien":"APP","explicacion":"Art. 8 Ley 41/2002: El consentimiento informado ser\u00e1 verbal por regla general; por escrito cuando se trate de intervenci\u00f3n quir\u00fargica, procedimientos diagn\u00f3sticos y terap\u00e9uticos invasores o que conlleven riesgos o inconvenientes de notoria y previsible repercusi\u00f3n negativa. La C lo recoge. Respuesta C."},{"cat":"Ley 41/2002 \u2014 Autonom\u00eda del Paciente y Documentaci\u00f3n Cl\u00ednica","num":146,"enunciado":"Seg\u00fan dispone la Ley 41/2002, de 14 de noviembre, b\u00e1sica reguladora de la autonom\u00eda del paciente y de derechos y obligaciones en materia de informaci\u00f3n y documentaci\u00f3n cl\u00ednica:","app":"C","sindicato":"A","correcta":"C","quien":"APP","explicacion":"Art. 9 Ley 41/2002: El m\u00e9dico puede llevar a cabo las intervenciones cl\u00ednicas indispensables sin consentimiento del paciente cuando exista riesgo para la salud p\u00fablica (necesidad terap\u00e9utica), riesgo inmediato grave para la integridad o cuando el paciente no sea capaz de decidir. La C recoge estos supuestos. Respuesta C."},{"cat":"Ley 41/2002 \u2014 Autonom\u00eda del Paciente y Documentaci\u00f3n Cl\u00ednica","num":147,"enunciado":"Seg\u00fan dispone la Ley 41/2002, de 14 de noviembre, b\u00e1sica reguladora de la autonom\u00eda del paciente y de derechos y obligaciones en materia de informaci\u00f3n y documentaci\u00f3n cl\u00ednica:","app":"C","sindicato":"D","correcta":"C","quien":"APP","explicacion":"Art. 11 Ley 41/2002: El documento de instrucciones previas (DIP) debe respetar el ordenamiento jur\u00eddico y la lex artis. No ser\u00e1 aplicado cuando contradiga la buena pr\u00e1ctica cl\u00ednica. La C recoge correctamente los l\u00edmites del DIP. Respuesta C."},{"cat":"Ley 41/2002 \u2014 Autonom\u00eda del Paciente y Documentaci\u00f3n Cl\u00ednica","num":148,"enunciado":"Seg\u00fan dispone la Ley 41/2002, de 14 de noviembre, b\u00e1sica reguladora de la autonom\u00eda del paciente y de derechos y obligaciones en materia de informaci\u00f3n y documentaci\u00f3n cl\u00ednica:","app":"C","sindicato":"D","correcta":"C","quien":"APP","explicacion":"Art. 14 Ley 41/2002: La historia cl\u00ednica comprende el conjunto de los documentos relativos a los procesos asistenciales de cada paciente, con la identificaci\u00f3n de los m\u00e9dicos y dem\u00e1s profesionales que han intervenido. La C recoge correctamente el contenido m\u00ednimo. Respuesta C."},{"cat":"Ley 41/2002 \u2014 Autonom\u00eda del Paciente y Documentaci\u00f3n Cl\u00ednica","num":151,"enunciado":"Seg\u00fan dispone la Ley 41/2002, de 14 de noviembre, b\u00e1sica reguladora de la autonom\u00eda del paciente y de derechos y obligaciones en materia de informaci\u00f3n y documentaci\u00f3n cl\u00ednica:","app":"C","sindicato":"A","correcta":"C","quien":"APP","explicacion":"Art. 15 Ley 41/2002: El contenido m\u00ednimo de la historia cl\u00ednica en cada episodio asistencial incluye: datos de identificaci\u00f3n, anamnesis y exploraci\u00f3n f\u00edsica, \u00f3rdenes m\u00e9dicas, hoja de interconsulta, informe de pruebas, consentimiento informado y epicrisis. La C recoge este contenido. Respuesta C."},{"cat":"Ley 41/2002 \u2014 Autonom\u00eda del Paciente y Documentaci\u00f3n Cl\u00ednica","num":152,"enunciado":"Seg\u00fan dispone la Ley 41/2002, de 14 de noviembre, b\u00e1sica reguladora de la autonom\u00eda del paciente y de derechos y obligaciones en materia de informaci\u00f3n y documentaci\u00f3n cl\u00ednica:","app":"C","sindicato":"A","correcta":"C","quien":"APP","explicacion":"Art. 17 Ley 41/2002: Los centros sanitarios tienen la obligaci\u00f3n de conservar la documentaci\u00f3n cl\u00ednica en condiciones que garanticen su correcto mantenimiento y seguridad durante el tiempo adecuado, m\u00ednimo 5 a\u00f1os desde la fecha del alta de cada proceso. Respuesta C."},{"cat":"Ley 41/2002 \u2014 Autonom\u00eda del Paciente y Documentaci\u00f3n Cl\u00ednica","num":153,"enunciado":"Seg\u00fan dispone la Ley 41/2002, de 14 de noviembre, b\u00e1sica reguladora de la autonom\u00eda del paciente y de derechos y obligaciones en materia de informaci\u00f3n y documentaci\u00f3n cl\u00ednica:","app":"C","sindicato":"B","correcta":"C","quien":"APP","explicacion":"Art. 18 Ley 41/2002: El paciente tiene derecho de acceso a la documentaci\u00f3n de la historia cl\u00ednica. El acceso de los familiares o allegados queda limitado cuando el paciente lo haya prohibido expresamente y se respetar\u00e1 siempre que no perjudique el inter\u00e9s de terceros. Respuesta C."},{"cat":"Ley 41/2002 \u2014 Autonom\u00eda del Paciente y Documentaci\u00f3n Cl\u00ednica","num":154,"enunciado":"Seg\u00fan dispone la Ley 41/2002, de 14 de noviembre, b\u00e1sica reguladora de la autonom\u00eda del paciente y de derechos y obligaciones en materia de informaci\u00f3n y documentaci\u00f3n cl\u00ednica:","app":"C","sindicato":"B","correcta":"C","quien":"APP","explicacion":"Art. 20 Ley 41/2002: La unidad de admisi\u00f3n y documentaci\u00f3n cl\u00ednica de cada centro tendr\u00e1 encomendada la custodia y la gesti\u00f3n de la historia cl\u00ednica. La C es correcta al atribuir esta funci\u00f3n a dicha unidad. Respuesta C."},{"cat":"Ley 41/2002 \u2014 Autonom\u00eda del Paciente y Documentaci\u00f3n Cl\u00ednica","num":160,"enunciado":"Seg\u00fan la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad, si el documento de voluntades anticipadas contiene previsiones contrarias al ordenamiento jur\u00eddico o a la buena pr\u00e1ctica cl\u00ednica:","app":"D","sindicato":"A","correcta":"D","quien":"APP","explicacion":"Art. 4 Ley 7/2002: Las instrucciones contrarias al ordenamiento jur\u00eddico o a la buena pr\u00e1ctica cl\u00ednica no ser\u00e1n aplicadas por los profesionales sanitarios y quedar\u00e1 constancia motivada de ello en la historia cl\u00ednica. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":157,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, el documento de voluntades anticipadas:","app":"D","sindicato":"B","correcta":"D","quien":"APP","explicacion":"Art. 2 Ley 7/2002: El documento de voluntades anticipadas puede otorgarse ante Notario, ante tres testigos o ante el/la funcionario/a responsable del Registro Vasco de Voluntades Anticipadas. Si se otorga ante testigos, ninguno puede ser heredero, ni empleado del centro que atiende al otorgante. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":158,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, en el caso de que el documento de voluntades anticipadas haya sido otorgado ante testigos:","app":"D","sindicato":"C","correcta":"D","quien":"APP","explicacion":"Art. 2.2 Ley 7/2002: Si el DVA se otorga ante tres testigos, ninguno de ellos puede ser heredero testamentario ni intestado, ni tampoco empleado del centro o instituci\u00f3n que est\u00e9 atendiendo al otorgante. La D recoge correctamente estas restricciones sobre los testigos. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":159,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, el firmante de un documento de voluntades anticipadas:","app":"D","sindicato":"A","correcta":"D","quien":"APP","explicacion":"Art. 3 Ley 7/2002: El firmante del DVA puede revocar o modificar su contenido en cualquier momento, por cualquier medio que permita dejar constancia fehaciente de la voluntad de revocar. La revocaci\u00f3n posterior prevalece sobre el documento anterior. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":161,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, la persona representante designada en el documento de voluntades anticipadas:","app":"D","sindicato":"A","correcta":"D","quien":"APP","explicacion":"Art. 4 Ley 7/2002: El representante designado en el DVA act\u00faa como interlocutor del otorgante ante el equipo sanitario para garantizar el cumplimiento de las instrucciones. Puede ser cualquier persona mayor de edad, sin necesidad de v\u00ednculo familiar. La D es correcta. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":162,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, el Registro Vasco de Voluntades Anticipadas:","app":"D","sindicato":"A","correcta":"D","quien":"APP","explicacion":"Art. 5 Ley 7/2002: El Registro Vasco de Voluntades Anticipadas es de car\u00e1cter p\u00fablico, adscrito al Departamento de Sanidad del Gobierno Vasco. Su acceso est\u00e1 restringido al propio interesado, su representante, y los profesionales sanitarios que atienden al otorgante. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":163,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, para poder otorgar un documento de voluntades anticipadas:","app":"D","sindicato":"C","correcta":"D","quien":"APP","explicacion":"Art. 2.1 Ley 7/2002: Para otorgar el DVA se requiere ser mayor de edad, estar en plenas facultades mentales y actuar libremente. No se requiere ninguna condici\u00f3n especial m\u00e9dica ni de salud. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":165,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, los profesionales sanitarios respecto a un documento de voluntades anticipadas registrado:","app":"D","sindicato":"B","correcta":"D","quien":"APP","explicacion":"Art. 4 Ley 7/2002: Los profesionales tienen obligaci\u00f3n de consultar el Registro antes de tomar decisiones en situaciones de incapacidad del paciente. Si existe DVA registrado, debe respetarse, salvo que sea contrario a la ley o a la buena pr\u00e1ctica cl\u00ednica. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":166,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, el documento de voluntades anticipadas:","app":"D","sindicato":"C","correcta":"D","quien":"APP","explicacion":"Art. 3 Ley 7/2002: El DVA puede ser revocado en cualquier momento sin necesidad de respetar ninguna formalidad especial, basta con manifestar la voluntad de forma fehaciente. La \u00faltima voluntad expresada prevalece sobre la anterior. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":167,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, el Departamento competente en materia de sanidad podr\u00e1 autorizar el acceso al Registro Vasco de Voluntades Anticipadas:","app":"D","sindicato":"A","correcta":"D","quien":"APP","explicacion":"Art. 5 Ley 7/2002: El acceso al Registro est\u00e1 limitado al otorgante, su representante y los profesionales sanitarios que le atienden. El Departamento podr\u00e1 autorizar el acceso con fines de investigaci\u00f3n siempre con datos disociados y garant\u00edas de confidencialidad. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":168,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, el documento de voluntades anticipadas podr\u00e1 contener:","app":"D","sindicato":"B","correcta":"D","quien":"APP","explicacion":"Art. 2.3 Ley 7/2002: El DVA puede contener: instrucciones sobre tratamientos deseados o rechazados, designaci\u00f3n de representante, y donaci\u00f3n de \u00f3rganos. No puede contener instrucciones contrarias al ordenamiento jur\u00eddico o a la buena pr\u00e1ctica. La D recoge correctamente el contenido posible. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":169,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, cuando el otorgante de un documento de voluntades anticipadas recupere la capacidad:","app":"D","sindicato":"C","correcta":"D","quien":"APP","explicacion":"Art. 3 Ley 7/2002: Si el otorgante recupera la capacidad de decidir, el DVA queda en suspenso y prevalece la voluntad actual del paciente. El documento mantiene su validez para futuras situaciones de incapacidad. Respuesta D."},{"cat":"Ley 7/2002 \u2014 Voluntades Anticipadas en el \u00c1mbito Sanitario","num":170,"enunciado":"Seg\u00fan dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el \u00e1mbito de la sanidad del Pa\u00eds Vasco, los documentos de voluntades anticipadas otorgados en cualquier Comunidad Aut\u00f3noma:","app":"D","sindicato":"A","correcta":"D","quien":"APP","explicacion":"Art. 5 bis Ley 7/2002: Los DVA otorgados en cualquier CCAA son v\u00e1lidos y exigibles en todo el territorio espa\u00f1ol. El Registro Vasco est\u00e1 interconectado con el Registro Nacional de Instrucciones Previas. Respuesta D."},{"cat":"Protecci\u00f3n de Datos Personales y Garant\u00eda de Derechos Digitales","num":173,"enunciado":"Con relaci\u00f3n al tratamiento de los datos personales de una persona menor de edad, se\u00f1ale la respuesta CORRECTA:","app":"D","sindicato":"A","correcta":"A","quien":"SINDICATO","explicacion":"Art. 7 LO 3/2018: El tratamiento de datos personales de menores requiere el consentimiento de sus padres o tutores cuando el menor sea menor de 14 a\u00f1os. Los mayores de 14 a\u00f1os pueden consentir por s\u00ed mismos. La A recoge correctamente este umbral de 14 a\u00f1os. Respuesta A."},{"cat":"Protecci\u00f3n de Datos Personales y Garant\u00eda de Derechos Digitales","num":174,"enunciado":"La Ley Org\u00e1nica 3/2018, de 5 de diciembre, de Protecci\u00f3n de Datos Personales y garant\u00eda de los derechos digitales (LOPDGDD):","app":"B","sindicato":"D","correcta":"B","quien":"APP","explicacion":"LO 3/2018: Esta norma adapta el ordenamiento jur\u00eddico espa\u00f1ol al Reglamento (UE) 2016/679 (RGPD) y regula los derechos digitales en el \u00e1mbito laboral, incluyendo el derecho a la desconexci\u00f3n digital. La B recoge correctamente la funci\u00f3n de la ley. Respuesta B."},{"cat":"Protecci\u00f3n de Datos Personales y Garant\u00eda de Derechos Digitales","num":178,"enunciado":"Respecto a los sistemas de informaci\u00f3n de denuncias internas que contempla la Ley Org\u00e1nica 3/2018, de 5 de diciembre, de Protecci\u00f3n de Datos Personales y garant\u00eda de los derechos digitales:","app":"D","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Art. 24 LO 3/2018: Los sistemas de denuncias internas deben garantizar la confidencialidad del denunciante. Los datos conservados s\u00f3lo podr\u00e1n ser accedidos por quienes sean indispensables para resolver la denuncia. La B recoge correctamente los requisitos de confidencialidad. Respuesta B."},{"cat":"Protecci\u00f3n de Datos Personales y Garant\u00eda de Derechos Digitales","num":179,"enunciado":"Se\u00f1ale la respuesta correcta respecto a la Agencia Espa\u00f1ola de Protecci\u00f3n de Datos:","app":"A","sindicato":"C","correcta":"C","quien":"SINDICATO","explicacion":"LO 3/2018 y RGPD: La Agencia Espa\u00f1ola de Protecci\u00f3n de Datos (AEPD) es la autoridad de control independiente, con personalidad jur\u00eddica propia y plena capacidad p\u00fablica y privada. Act\u00faa con plena independencia de los poderes p\u00fablicos. La C recoge correctamente sus caracter\u00edsticas. Respuesta C."},{"cat":"DL 1/2023 \u2014 Igualdad de Mujeres y Hombres y Violencia Machista","num":181,"enunciado":"Seg\u00fan el Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista en Euskadi:","app":"B","sindicato":"A","correcta":"B","quien":"APP","explicacion":"DL 1/2023: La norma establece que los planes de igualdad en el \u00e1mbito de la Administraci\u00f3n P\u00fablica vasca son preceptivos y deben evaluarse peri\u00f3dicamente. La B recoge correctamente el alcance y car\u00e1cter obligatorio de estos planes. Respuesta B."},{"cat":"DL 1/2023 \u2014 Igualdad de Mujeres y Hombres y Violencia Machista","num":185,"enunciado":"Seg\u00fan el Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista en Euskadi:","app":"B","sindicato":"C","correcta":"B","quien":"APP","explicacion":"DL 1/2023: Se reconoce el derecho de las v\u00edctimas de violencia machista a recibir atenci\u00f3n integral e inmediata, incluida la atenci\u00f3n sanitaria, psicol\u00f3gica, jur\u00eddica y social. La B recoge correctamente este derecho a la atenci\u00f3n integral. Respuesta B."},{"cat":"Plan de Salud de Euskadi 2030","num":194,"enunciado":"El Objetivo General 1 (OG1) del Plan de Salud Euskadi 2030 se enfoca en:","app":"A","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Plan de Salud Euskadi 2030: El OG1 se centra en 'Mejorar la salud y el bienestar de la poblaci\u00f3n de Euskadi', con especial \u00e9nfasis en la reducci\u00f3n de las desigualdades en salud. La B recoge correctamente este objetivo general. Respuesta B."},{"cat":"Plan de Salud de Euskadi 2030","num":198,"enunciado":"\u00bfCu\u00e1ntas personas aproximadamente, entre expertas, profesionales, entidades y ciudadan\u00eda, contribuyeron a la elaboraci\u00f3n del Plan de Salud Euskadi 2030?","app":"C","sindicato":"D","correcta":"D","quien":"SINDICATO","explicacion":"Plan de Salud Euskadi 2030 (introducci\u00f3n): En la elaboraci\u00f3n del plan participaron aproximadamente 3.000 personas (expertas, profesionales, entidades y ciudadan\u00eda). La D recoge este dato num\u00e9rico correcto. Respuesta D."},{"cat":"Plan de Salud de Euskadi 2030","num":199,"enunciado":"La MISI\u00d3N del Plan de Salud Euskadi 2030 se define como:","app":"B","sindicato":"C","correcta":"C","quien":"SINDICATO","explicacion":"Plan de Salud Euskadi 2030: La MISI\u00d3N se define como 'Mejorar la salud y el bienestar de la poblaci\u00f3n de Euskadi, garantizando el acceso equitativo a una atenci\u00f3n sanitaria de calidad'. La C recoge mejor esta definici\u00f3n. Respuesta C."},{"cat":"Plan de Salud de Euskadi 2030","num":202,"enunciado":"Dentro del Objetivo General 5 del Plan de Salud Euskadi 2030, \u00bfcu\u00e1les son las caracter\u00edsticas que debe reunir el sistema sanitario?","app":"C","sindicato":"D","correcta":"D","quien":"SINDICATO","explicacion":"Plan de Salud Euskadi 2030, OG5: El sistema sanitario debe ser sostenible, resiliente e innovador. La D recoge estas tres caracter\u00edsticas principales. Respuesta D."},{"cat":"Plan de Salud de Euskadi 2030","num":204,"enunciado":"Seg\u00fan el modelo de evaluaci\u00f3n del Plan de Salud Euskadi 2030, \u00bfcu\u00e1les son los cuatro criterios fundamentales de evaluaci\u00f3n?","app":"D","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Plan de Salud Euskadi 2030: El modelo de evaluaci\u00f3n se basa en cuatro criterios: eficacia, efectividad, eficiencia y equidad. La B recoge correctamente estos cuatro criterios. Respuesta B."},{"cat":"Plan de Salud de Euskadi 2030","num":206,"enunciado":"Seg\u00fan la comparativa de la Memoria Econ\u00f3mica del Plan de Salud Euskadi 2030, \u00bfcu\u00e1l es el programa presupuestario con mayor dotaci\u00f3n?","app":"C","sindicato":"B","correcta":"B","quien":"SINDICATO","explicacion":"Plan de Salud Euskadi 2030, Memoria Econ\u00f3mica: El programa presupuestario con mayor dotaci\u00f3n es el de Atenci\u00f3n Especializada / Hospitales. La B es la respuesta correcta. Respuesta B."},{"cat":"Estrategia de Seguridad del Paciente en Osakidetza 2030","num":234,"enunciado":"\u00bfA qu\u00e9 periodos correspondieron las dos estrategias previas de seguridad de paciente publicadas en Euskadi?","app":"B","sindicato":"A","correcta":"A","quien":"SINDICATO","explicacion":"Estrategia de Seguridad del Paciente 2030: Las dos estrategias previas correspondieron a los periodos 2009-2012 y 2013-2016. La A recoge correctamente ambos periodos. Respuesta A."},{"cat":"Estrategia de Seguridad del Paciente en Osakidetza 2030","num":235,"enunciado":"\u00bfCu\u00e1les son las dos nuevas L\u00edneas de Acci\u00f3n incorporadas en la \u201cEstrategia de Seguridad del Paciente 20-30\u201d respecto a la anterior?","app":"A","sindicato":"C","correcta":"C","quien":"SINDICATO","explicacion":"Estrategia de Seguridad del Paciente 2030: Las dos nuevas l\u00edneas de acci\u00f3n incorporadas son la L9 (Seguridad en la transici\u00f3n asistencial) y la L10 (Cultura de seguridad en la organizaci\u00f3n). La C recoge estas dos nuevas l\u00edneas. Respuesta C."},{"cat":"Estrategia de Seguridad del Paciente en Osakidetza 2030","num":237,"enunciado":"\u00bfCu\u00e1l es el enfoque principal de la L\u00ednea de Acci\u00f3n Corporativa L2 de la \u201cEstrategia de Seguridad del Paciente 20-30\u201d?","app":"C","sindicato":"D","correcta":"D","quien":"SINDICATO","explicacion":"Estrategia de Seguridad del Paciente 2030, L2: La L2 se centra en la comunicaci\u00f3n y la notificaci\u00f3n const cats = [...new Set(DATA.map(r=>r.cat))];
const sel = document.getElementById('fcat');
cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c.replace(/ — /,' – ').slice(0,55)+(c.length>55?'…':'');sel.appendChild(o);});

function getColor(quien){
  if(quien==='APP') return {bg:'#E6F1FB',color:'#0C447C'};
  if(quien==='SINDICATO') return {bg:'#EAF3DE',color:'#27500A'};
  if(quien==='NINGUNO') return {bg:'#FAEEDA',color:'#633806'};
  return {bg:'#EEEDFE',color:'#3C3489'};
}
function letterBadge(letter, isCorrect){
  const cls = isCorrect ? 'b-correct' : 'b-wrong';
  return '<span class="badge '+cls+'">'+letter+'</span>';
}

function render(){
  const search = document.getElementById('search').value.toLowerCase();
  const fcat = document.getElementById('fcat').value;
  const fwho = document.getElementById('fwho').value;
  const filtered = DATA.filter(r=>{
    if(fcat && r.cat!==fcat) return false;
    if(fwho && r.quien!==fwho) return false;
    if(search && !r.enunciado.toLowerCase().includes(search) && !r.cat.toLowerCase().includes(search)) return false;
    return true;
  });
  document.getElementById('cnt').textContent = 'Mostrando '+filtered.length+' de 108 preguntas';
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map(r=>{
    const {bg,color} = getColor(r.quien);
    const appOk = r.app===r.correcta;
    const sinOk = r.sindicato===r.correcta;
    const label = r.quien==='APP'?'App ✓':r.quien==='SINDICATO'?'Sindicato ✓':r.quien==='AMBOS'?'Ambos ✓':'Ninguno ✗';
    return '<tr><td style="white-space:nowrap;font-weight:500;color:var(--color-text-secondary);font-size:12px">#'+r.num+'</td>'+
      '<td class="enunciado">'+r.enunciado+'<span class="cat-tag">'+r.cat.replace(/ — /,' – ')+'</span></td>'+
      '<td>'+letterBadge(r.app,appOk)+'</td>'+
      '<td>'+letterBadge(r.sindicato,sinOk)+'</td>'+
      '<td><span class="badge b-same">'+r.correcta+'</span></td>'+
      '<td><span class="badge" style="background:'+bg+';color:'+color+'">'+label+'</span>'+
        (r.explicacion?'<br><button class="toggle-exp" onclick="toggleExp(this)">ver explicación</button><div class="exp" style="display:none">'+r.explicacion+'</div>':'')+
      '</td></tr>';
  }).join('');
}

function toggleExp(btn){
  const div = btn.nextElementSibling;
  if(div.style.display==='none'){div.style.display='block';btn.textContent='ocultar';}
  else{div.style.display='none';btn.textContent='ver explicación';}
}

render();
</script>
